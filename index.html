<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Water Quest</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body>
  <div class="container">
    <h1>Water Quest</h1>

    <p class="game-instructions">
      Choose a difficulty and collect water cans before time runs out!
    </p>

    <!-- ✅ NEW: DIFFICULTY BUTTONS -->
    <div class="difficulty">
      <button onclick="setDifficulty('easy')">Easy</button>
      <button onclick="setDifficulty('normal')">Normal</button>
      <button onclick="setDifficulty('hard')">Hard</button>
    </div>

    <div class="stats">
      <p>Cans Collected: <span id="current-cans">0</span></p>
      <p>Time Left: <span id="timer">30</span>s</p>
    </div>

    <div id="achievements" class="achievement"></div>

    <div class="game-grid"></div>

    <button id="start-game">Start Game</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
